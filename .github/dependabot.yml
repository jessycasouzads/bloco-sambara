version: 2
updates:
  # Updates de npm — un solo PR semanal con TODOS los minor/patch agrupados.
  # Majors se ignoran automáticamente (los manejamos manualmente con tiempo
  # para revisar breaking changes).
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'Europe/Madrid'
    open-pull-requests-limit: 3
    versioning-strategy: 'increase'
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    ignore:
      # Ignorar majors — requieren revisión manual de breaking changes
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
    groups:
      # Un solo PR con todos los minor/patch updates por semana
      npm-all:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  # Updates de GitHub Actions — más simples, mensual está bien
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'chore(ci)'
    groups:
      gh-actions:
        patterns:
          - '*'
